body:
  text: 太上靈寶淨明法序淨明法者乃上清玄都玉京之隱書昔太陽真君孝道明王以孝道著明照臨下土成無上道於是上清上帝降於扶桑洞神之堂召明王而説法證之以為最上弟子號靈寶大真人玉清詔命使以救度于時故真人發大誓願願居東極用救羣品是謂靈寶救苦天尊乃赤明元年八月十五日也謂之淨明淨明者無幽不燭纎塵不汙愚智皆仰之為開度之門升真之路以孝悌為之凖式修錬為之方術行持之祕要積纍相資磨礲智慧而後道氣堅完神人伏役一瞬息間可達玄理余昔慕道風遍求師旨心存目識志切意堅自受法吳君後學諶姆功行巳就復遇上聖傳以此書其術乃成至於蒙恩超舉神妙之迹不可具言得吾書者愼無自棄皆十世積纍將有飛升之漸吾嘗著其末淺作道經三十五篇行于人世得者猶鮮況此樞機皆上聖祕籙行之詎可忽乎謹序
