body:
  text: 太上靈寳淨明法序淨明法者乃上清玄都玉京之隱書昔太陽眞君孝道明王以孝道著明照臨下土成无上道於是上清上帝降於扶桑洞神之堂召明王而說法證之以爲最上弟子號靈寳大眞人玉清詔命使以救度于時故眞人發大誓願願居東極用救羣品是謂靈寳救苦天尊乃赤明元年八月十五日也謂之淨明淨明者无幽不燭纎塵不汙愚智皆仰之爲開度之門昇眞之路以孝悌爲之凖式修錬爲之方術行持之秘要積累相資磨礲智慧而後道炁堅完神人伏役一瞬息間可達玄理余昔慕道風徧求師旨心存目識志切意堅自受法吳君後學諶姆功行巳就復遇上聖傳以此書其術乃成至於蒙恩超舉神妙之跡不可具言得吾書者愼无自棄皆十世積累將有飛昇之漸吾甞著其末淺作道經三十五篇行于人世得者猶鮮況此樞機皆上聖秘籙行之詎可忽乎謹序
